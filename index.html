<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKK1 — ระบบรับกลับ v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --card: #21253a; --border: #2e3350;
  --accent: #4f8ef7; --accent2: #7c5cfc; --green: #22c55e; --amber: #f59e0b;
  --red: #ef4444; --text: #e8eaf6; --muted: #8891b2;
}
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

/* NAV */
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 4px; height: 52px; position: sticky; top: 0; z-index: 200; }
nav .logo { font-weight: 700; font-size: 16px; color: var(--accent); margin-right: 16px; letter-spacing: 1px; white-space: nowrap; }
.tab { padding: 6px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; transition: all .2s; white-space: nowrap; }
.tab.active { background: var(--card); color: var(--text); }
.tab.t1.active { color: var(--accent); border-bottom: 2px solid var(--accent); border-radius: 8px 8px 0 0; }
.tab.t2.active { color: var(--accent2); border-bottom: 2px solid var(--accent2); border-radius: 8px 8px 0 0; }
.tab.t3.active { color: var(--green); border-bottom: 2px solid var(--green); border-radius: 8px 8px 0 0; }

/* CLOCK */
.clock { margin-left: auto; font-size: 13px; font-weight: 600; color: var(--muted); font-family: monospace; white-space: nowrap; }

/* PAGE */
.page { display: none; padding: 20px; max-width: 920px; margin: 0 auto; }
.page.active { display: block; }

/* CARDS & INPUTS */
.box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.box-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 12px; }
.row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
.inp { flex: 1; min-width: 160px; background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); padding: 11px 14px; font-size: 14px; outline: none; transition: border .2s; }
.inp:focus { border-color: var(--accent); }
.btn { padding: 11px 20px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3d7de0; }
.btn-success { background: #0c2d1a; color: var(--green); border: 1.5px solid var(--green); }
.btn-danger { background: #2d0f0f; color: var(--red); border: 1.5px solid var(--red); }
.btn-purple { background: #1a0f3d; color: var(--accent2); border: 1.5px solid var(--accent2); }
.btn-sm { padding: 7px 13px; font-size: 12px; border-radius: 8px; }
.btn-export { background: #0f2d1f; color: var(--green); border: 1.5px solid var(--green); padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* AUTOCOMPLETE */
.ac-wrap { position: relative; flex: 1; min-width: 160px; }
.ac-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--card); border: 1.5px solid var(--accent); border-radius: 10px; z-index: 500; max-height: 200px; overflow-y: auto; box-shadow: 0 8px 24px #0008; }
.ac-item { padding: 9px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: #2a2f50; }
.ac-set { font-weight: 700; color: var(--text); min-width: 120px; }
.ac-desc { color: var(--muted); font-size: 12px; }
.ac-type-i { color: var(--accent); font-size: 11px; font-weight: 700; }
.ac-type-p { color: var(--accent2); font-size: 11px; font-weight: 700; }

/* MATCH INFO */
.match-info { background: #0f2030; border: 1px solid #1e5080; border-radius: 8px; padding: 9px 14px; font-size: 13px; color: #7bb5e8; margin-top: 8px; }

/* TABLE */
.tbl-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
.tbl-head { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--card); }
.tbl-head-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
table { width: 100%; border-collapse: collapse; }
th { padding: 9px 13px; text-align: left; font-size: 11px; color: var(--muted); font-weight: 700; background: var(--card); border-bottom: 1px solid var(--border); letter-spacing: .4px; }
td { padding: 10px 13px; font-size: 13px; border-bottom: 1px solid #1e2236; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #1e2236; }

/* BADGES */
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.bg-blue { background: #0f1e3d; color: var(--accent); }
.bg-purple { background: #1a0f3d; color: var(--accent2); }
.bg-green { background: #0f2d1f; color: var(--green); }
.bg-amber { background: #2d1f0a; color: var(--amber); }
.bg-red { background: #2d0f0f; color: var(--red); }
.area-badge { background: #1a2240; color: var(--accent); border: 1px solid #2e4280; border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; }

/* SUBMIT BAR */
.submit-bar { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

/* ORDER CARD */
.order-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; }
.order-card-head { padding: 13px 17px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); background: var(--card); gap: 10px; }
.order-no { font-size: 15px; font-weight: 700; color: var(--accent); }
.order-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
.ts-chip { font-size: 11px; background: #1a1035; color: var(--accent2); padding: 3px 9px; border-radius: 6px; }
.ts-chip.done { background: #0f2d1f; color: var(--green); }
.order-body { padding: 14px 17px; }

/* PHOTOS */
.photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.photo-slot { background: var(--card); border: 1.5px dashed var(--border); border-radius: 10px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--muted); position: relative; overflow: hidden; cursor: pointer; transition: border .2s; }
.photo-slot:hover { border-color: var(--accent2); }
.photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }
.photo-slot .rm { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.65); border: none; border-radius: 50%; width: 22px; height: 22px; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 3; }
.photo-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.photo-ts { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ACTION ROW */
.action-row { margin-top: 13px; display: flex; gap: 9px; align-items: center; flex-wrap: wrap; }
select { background: var(--card); border: 1.5px solid var(--border); color: var(--text); padding: 10px 13px; border-radius: 10px; font-size: 13px; outline: none; cursor: pointer; flex: 1; min-width: 140px; }

/* STATS */
.stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 18px; }
.stat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 15px 17px; }
.stat-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.stat-val { font-size: 28px; font-weight: 800; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.fbtn { background: var(--card); border: 1.5px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 13px; font-size: 13px; cursor: pointer; transition: all .18s; }
.fbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.date-inp { background: var(--card); border: 1.5px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 9px; font-size: 13px; outline: none; }

/* ITEMS CHIPS */
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.chip { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 12px; color: var(--muted); }

/* TOAST */
.toast-wrap { position: fixed; top: 60px; right: 18px; display: flex; flex-direction: column; gap: 7px; z-index: 9999; pointer-events: none; }
.toast { background: var(--card); border: 1px solid var(--green); color: var(--green); padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; animation: ti .25s ease; max-width: 280px; }
.toast.err { border-color: var(--red); color: var(--red); }
.toast.warn { border-color: var(--amber); color: var(--amber); }
@keyframes ti { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
</style>
</head>

const ALL_PRODUCTS = [
  ...PRODUCTS.instrument.map(p=>({...p,type:'Instrument'})),
  ...PRODUCTS.implant.map(p=>({...p,type:'Implant'}))
];
const LOOKUP = {};
ALL_PRODUCTS.forEach(p=>{ if(p.Set) LOOKUP[p.Set.trim().toUpperCase()] = p; });

// ===== STATE =====
let currentItems = [];
let orders = [];
let t3Filter = 'all';
let acIdx = -1;
let startTs = null;

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('th-TH',{hour12:false});
  const ts = now.toLocaleString('th-TH',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('liveTs').textContent = ts;
  if(!startTs) document.getElementById('tsDisplay').textContent = ts;
}
setInterval(updateClock, 1000);
updateClock();

// ===== TABS =====
const tabs = document.querySelectorAll('.tab');
const pages = document.querySelectorAll('.page');
function switchTab(i) {
  tabs.forEach((t,j)=>t.classList.toggle('active',i===j));
  pages.forEach((p,j)=>p.classList.toggle('active',i===j));
  if(i===1) renderT2();
  if(i===2) renderT3();
}

// ===== AUTOCOMPLETE =====
function onSetInput() {
  const v = document.getElementById('setInput').value.trim();
  acIdx = -1;
  updateMatchInfo(v);
  if(v.length < 1) { closeDrop(); return; }
  const vu = v.toUpperCase();
  const hits = ALL_PRODUCTS.filter(p=>p.Set && p.Set.toUpperCase().includes(vu)).slice(0,12);
  if(!hits.length) { closeDrop(); return; }
  const drop = document.getElementById('acDrop');
  drop.style.display = 'block';
  drop.innerHTML = hits.map((p,i)=>`
    <div class="ac-item" onmousedown="pickAC(event,\'${p.Set.replace(/'/g,"\\'")}\')" data-idx="${i}">
      <span class="ac-set">${highlight(p.Set,v)}</span>
      <span class="ac-desc">${p['Mat Desc']||''}</span>
      <span class="${p.type==='Instrument'?'ac-type-i':'ac-type-p'}">${p.type==='Instrument'?'INS':'IMP'}</span>
    </div>`).join('');
}

function highlight(str, q) {
  const i = str.toUpperCase().indexOf(q.toUpperCase());
  if(i<0) return str;
  return str.slice(0,i)+'<mark style="background:#2a4480;color:#fff;border-radius:3px">'+str.slice(i,i+q.length)+'</mark>'+str.slice(i+q.length);
}

function onSetKey(e) {
  const drop = document.getElementById('acDrop');
  const items = drop.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown') { acIdx=Math.min(acIdx+1,items.length-1); highlightAC(items); e.preventDefault(); }
  else if(e.key==='ArrowUp') { acIdx=Math.max(acIdx-1,-1); highlightAC(items); e.preventDefault(); }
  else if(e.key==='Enter') {
    if(acIdx>=0 && items[acIdx]) { items[acIdx].dispatchEvent(new MouseEvent('mousedown')); }
    else addItem();
    e.preventDefault();
  }
  else if(e.key==='Escape') closeDrop();
}

function highlightAC(items) {
  items.forEach((el,i)=>el.style.background=i===acIdx?'#2a3060':'');
  if(items[acIdx]) items[acIdx].scrollIntoView({block:'nearest'});
}

function pickAC(e, setVal) {
  e.preventDefault();
  document.getElementById('setInput').value = setVal;
  closeDrop();
  updateMatchInfo(setVal);
}

function closeDrop() { document.getElementById('acDrop').style.display='none'; }

function updateMatchInfo(v) {
  if(!v) { document.getElementById('matchInfo').style.display='none'; return; }
  const m = LOOKUP[v.toUpperCase()];
  const el = document.getElementById('matchInfo');
  if(m) {
    el.className='match-info';
    el.style.display='block';
    el.innerHTML=`✅ พบ: <strong>${m.Set}</strong> — ${m['Mat Desc']} | ${m.type} | Final Code: ${m['Final Code']} | Area: ${m.Area||'—'}`;
  } else {
    el.style.display='none';
  }
}

// ===== TEAM 1 LOGIC =====
function addItem() {
  closeDrop();
  const setVal = document.getElementById('setInput').value.trim();
  if(!setVal) { toast('กรุณาระบุ Set','warn'); return; }
  const found = LOOKUP[setVal.toUpperCase()];
  if(!found) {
    currentItems.push({Set:setVal,'Mat Desc':'—','Final Code':'—',Area:'—',type:'?'});
    toast('⚠️ ไม่พบในระบบ — บันทึก Manual','warn');
  } else {
    currentItems.push({...found});
    toast('✅ เพิ่ม '+found.Set);
  }
  if(!startTs) {
    startTs = new Date().toLocaleString('th-TH',{hour12:false});
    document.getElementById('tsDisplay').textContent = startTs;
  }
  document.getElementById('setInput').value='';
  document.getElementById('matchInfo').style.display='none';
  renderItems();
  document.getElementById('setInput').focus();
}

function removeItem(i) { currentItems.splice(i,1); renderItems(); }

function renderItems() {
  const orderNo = document.getElementById('orderInput').value.trim();
  document.getElementById('orderDisplay').textContent = orderNo||'—';
  document.getElementById('itemCount').textContent = currentItems.length+' รายการ';
  const tbody = document.getElementById('itemsBody');
  if(!currentItems.length) {
    tbody.innerHTML='<tr><td colspan="7" class="empty-state">ยังไม่มีรายการ — สแกนหรือคีย์ Set</td></tr>';
    return;
  }
  tbody.innerHTML = currentItems.map((it,i)=>`
    <tr>
      <td style="color:var(--muted);font-size:12px">${i+1}</td>
      <td><strong>${it.Set}</strong></td>
      <td>${it['Mat Desc']}</td>
      <td style="font-size:11px;color:var(--muted)">${it['Final Code']}</td>
      <td>${it.Area&&it.Area!=='—'?'<span class=\"area-badge\">'+it.Area+'</span>':'—'}</td>
      <td><span class="badge ${it.type==='Instrument'?'bg-blue':it.type==='Implant'?'bg-purple':'bg-amber'}">${it.type==='Instrument'?'INS':it.type==='Implant'?'IMP':'?'}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="removeItem(${i})">✕</button></td>
    </tr>`).join('');
}

function submitOrder() {
  const orderNo = document.getElementById('orderInput').value.trim();
  if(!orderNo) { toast('กรุณาระบุเลขออเดอร์','warn'); return; }
  if(!currentItems.length) { toast('กรุณาเพิ่มสินค้าอย่างน้อย 1 รายการ','warn'); return; }
  const areaSet = [...new Set(currentItems.map(it=>it.Area).filter(a=>a&&a!=='—'))];
  orders.push({
    id: Date.now(),
    orderNo,
    items: [...currentItems],
    receivedAt: startTs || new Date().toLocaleString('th-TH',{hour12:false}),
    receivedDate: new Date().toISOString().slice(0,10),
    status:'pending',
    photos:[null,null],
    photoTs:[null,null],
    selectedStatus:'',
    doneAt:null,
    areas: areaSet,
  });
  toast('✅ ส่งออเดอร์ '+orderNo+' ไปทีม 2!');
  clearAll();
}

function clearAll() {
  currentItems=[];
  startTs=null;
  document.getElementById('orderInput').value='';
  document.getElementById('setInput').value='';
  document.getElementById('matchInfo').style.display='none';
  document.getElementById('tsDisplay').textContent='—';
  renderItems();
}

// ===== TEAM 2 =====
function renderT2() {
  const pending = orders.filter(o=>o.status==='pending');
  document.getElementById('t2Count').textContent = pending.length+' รายการ';
  const el = document.getElementById('t2List');
  if(!pending.length) { el.innerHTML='<div class="empty-state">✅ ไม่มีออเดอร์ค้าง</div>'; return; }
  el.innerHTML = pending.map(o=>orderCard(o)).join('');
}

function orderCard(o) {
  return `
  <div class="order-card" id="card-${o.id}">
    <div class="order-card-head">
      <div style="flex:1">
        <span class="order-no">${o.orderNo}</span>
        <div class="order-meta">
          ${o.areas&&o.areas.length?o.areas.map(a=>`<span class="area-badge">${a}</span>`).join(''):''}
          <span class="ts-chip">🕐 รับกลับ: ${o.receivedAt}</span>
          <span class="ts-chip" id="elapsed-${o.id}"></span>
        </div>
        <div class="chips" style="margin-top:8px">
          ${o.items.map(it=>`<span class="chip">${it.Set}${it['Mat Desc']!=='—'?' · '+it['Mat Desc']:''}</span>`).join('')}
        </div>
      </div>
      <span class="badge bg-amber" style="margin-left:8px;white-space:nowrap">⏳ ค้าง</span>
    </div>
    <div class="order-body">
      <div class="photo-label">แนบรูปหลักฐาน 2 ระบบ</div>
      <div class="photos-grid">
        ${[0,1].map(slot=>`
          <div>
            <div class="photo-label">ระบบ ${slot+1}</div>
            <div class="photo-slot">
              <input type="file" accept="image/*" onchange="handlePhoto(event,${o.id},${slot})">
              ${o.photos[slot]
                ?`<img src="${o.photos[slot]}"><button class="rm" onclick="event.stopPropagation();removePhoto(${o.id},${slot})">✕</button>`
                :`<span style="font-size:20px">📷</span><span>อัพโหลดรูป</span>`}
            </div>
            ${o.photoTs[slot]?`<div class="photo-ts">🕐 ${o.photoTs[slot]}</div>`:''}
          </div>`).join('')}
      </div>
      <div class="action-row">
        <select onchange="setOrderStatus(${o.id},this.value)">
          <option value="">— เลือกสถานะ —</option>
          <option value="เปลี่ยนสถานะแล้ว" ${o.selectedStatus==='เปลี่ยนสถานะแล้ว'?'selected':''}>เปลี่ยนสถานะแล้ว</option>
          <option value="รอยืนยัน" ${o.selectedStatus==='รอยืนยัน'?'selected':''}>รอยืนยัน</option>
          <option value="มีปัญหา" ${o.selectedStatus==='มีปัญหา'?'selected':''}>มีปัญหา</option>
        </select>
        <button class="btn btn-success" onclick="markDone(${o.id})">✅ ดำเนินการเสร็จ</button>
      </div>
    </div>
  </div>`;
}

function handlePhoto(e,id,slot) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const o = orders.find(x=>x.id===id);
    if(!o) return;
    o.photos[slot]=ev.target.result;
    o.photoTs[slot]=new Date().toLocaleString('th-TH',{hour12:false});
    renderT2();
    toast('📷 อัพโหลดรูประบบ '+(slot+1)+' เวลา '+o.photoTs[slot]);
  };
  reader.readAsDataURL(file);
}

function removePhoto(id,slot) {
  const o=orders.find(x=>x.id===id);
  if(!o) return;
  o.photos[slot]=null; o.photoTs[slot]=null;
  renderT2();
}

function setOrderStatus(id,val) {
  const o=orders.find(x=>x.id===id);
  if(!o) return;
  o.selectedStatus=val;
}

function markDone(id) {
  const o=orders.find(x=>x.id===id);
  if(!o) return;
  if(!o.photos[0]&&!o.photos[1]) { toast('กรุณาแนบรูปอย่างน้อย 1 รูป','warn'); return; }
  o.status='done';
  o.doneAt=new Date().toLocaleString('th-TH',{hour12:false});
  toast('✅ ออเดอร์ '+o.orderNo+' เสร็จสมบูรณ์!');
  renderT2();
  renderT3Stats();
}

// Elapsed timer for pending cards
setInterval(()=>{
  orders.filter(o=>o.status==='pending').forEach(o=>{
    const el=document.getElementById('elapsed-'+o.id);
    if(!el) return;
    const diff = Math.floor((Date.now()-o.id)/1000);
    const h=Math.floor(diff/3600), m=Math.floor((diff%3600)/60), s=diff%60;
    const txt = h?`${h}ชม. ${m}น.`:`${m}น. ${s}ว.`;
    el.textContent = '⏱ '+txt;
    el.style.color = diff>3600?'var(--red)':diff>1800?'var(--amber)':'var(--muted)';
  });
}, 1000);

// ===== EXPORT PDF (Print) =====
function exportPDF() {
  const done = orders.filter(o=>o.status==='done');
  if(!done.length) { toast('ยังไม่มีออเดอร์ที่เสร็จแล้ว','warn'); return; }
  const win = window.open('','_blank');
  win.document.write(`<html><head><title>BKK1 Return Report</title>
  <style>body{font-family:Arial,sans-serif;padding:20px;font-size:12px;}
  h2{margin-bottom:12px;}table{width:100%;border-collapse:collapse;margin-bottom:20px;}
  th,td{border:1px solid #ccc;padding:6px 10px;text-align:left;}th{background:#eee;}
  .section{margin-bottom:24px;page-break-inside:avoid;}
  </style></head><body>
  <h2>BKK1 — รายงานรับกลับ (พิมพ์: ${new Date().toLocaleString('th-TH',{hour12:false})})</h2>
  ${done.map(o=>`
    <div class="section">
      <h3>ออเดอร์: ${o.orderNo} | รับกลับ: ${o.receivedAt} | เสร็จ: ${o.doneAt}</h3>
      <table><thead><tr><th>#</th><th>Set</th><th>Mat Desc</th><th>Final Code</th><th>Area</th><th>Type</th></tr></thead>
      <tbody>${o.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.Set}</td><td>${it['Mat Desc']}</td><td>${it['Final Code']}</td><td>${it.Area}</td><td>${it.type}</td></tr>`).join('')}</tbody>
      </table>
      <div>รูปหลักฐาน: ${[0,1].map(s=>o.photos[s]?`ระบบ${s+1}: ${o.photoTs[s]}`:'').filter(Boolean).join(' | ')||'—'}</div>
    </div>`).join('')}
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 400);
}

// ===== TEAM 3 =====
function setFilter(f, el) {
  t3Filter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderT3();
}

function renderT3Stats() {
  document.getElementById('s-total').textContent=orders.length;
  document.getElementById('s-pending').textContent=orders.filter(o=>o.status==='pending').length;
  document.getElementById('s-done').textContent=orders.filter(o=>o.status==='done').length;
}

function renderT3() {
  renderT3Stats();
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const q = document.getElementById('searchQ').value.trim().toLowerCase();

  let list = orders.filter(o=>{
    if(t3Filter!=='all'&&o.status!==t3Filter) return false;
    if(from&&o.receivedDate<from) return false;
    if(to&&o.receivedDate>to) return false;
    if(q) {
      const combined = o.orderNo+' '+o.items.map(it=>it.Set+' '+it['Mat Desc']).join(' ');
      if(!combined.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const el = document.getElementById('t3List');
  if(!list.length) { el.innerHTML='<div class="empty-state">ไม่มีออเดอร์ที่ตรงเงื่อนไข</div>'; return; }

  el.innerHTML = [...list].reverse().map(o=>{
    const isDone=o.status==='done';
    return `
    <div class="order-card">
      <div class="order-card-head">
        <div style="flex:1">
          <span class="order-no">${o.orderNo}</span>
          <div class="order-meta">
            ${o.areas&&o.areas.length?o.areas.map(a=>`<span class="area-badge">${a}</span>`).join(''):''}
            <span class="ts-chip">🕐 รับกลับ: ${o.receivedAt}</span>
            ${isDone?`<span class="ts-chip done">✅ เสร็จ: ${o.doneAt}</span>`:''}
          </div>
          <div class="chips" style="margin-top:6px">${o.items.map(it=>`<span class="chip">${it.Set}</span>`).join('')}</div>
        </div>
        <span class="badge ${isDone?'bg-green':'bg-amber'}" style="margin-left:8px;white-space:nowrap">${isDone?'✅ เสร็จ':'⏳ ค้าง'}</span>
      </div>
      ${isDone&&(o.photos[0]||o.photos[1])?`
      <div class="order-body" style="display:flex;gap:12px;flex-wrap:wrap;">
        ${o.photos[0]?`<div><img src="${o.photos[0]}" style="width:80px;height:64px;object-fit:cover;border-radius:7px"><div class="photo-ts">ระบบ 1 · ${o.photoTs[0]}</div></div>`:''}
        ${o.photos[1]?`<div><img src="${o.photos[1]}" style="width:80px;height:64px;object-fit:cover;border-radius:7px"><div class="photo-ts">ระบบ 2 · ${o.photoTs[1]}</div></div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

// ===== EXPORT EXCEL =====
function exportExcel() {
  if(!orders.length) { toast('ยังไม่มีข้อมูล','warn'); return; }
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const q = document.getElementById('searchQ').value.trim().toLowerCase();

  let list = orders.filter(o=>{
    if(t3Filter!=='all'&&o.status!==t3Filter) return false;
    if(from&&o.receivedDate<from) return false;
    if(to&&o.receivedDate>to) return false;
    if(q){const c=o.orderNo+' '+o.items.map(it=>it.Set+' '+it['Mat Desc']).join(' ');if(!c.toLowerCase().includes(q))return false;}
    return true;
  });

  if(!list.length) { toast('ไม่มีข้อมูลที่กรอง','warn'); return; }

  const rows = [];
  list.forEach(o=>{
    o.items.forEach((it,i)=>{
      rows.push({
        'ออเดอร์': o.orderNo,
        'เวลารับกลับ': o.receivedAt,
        'สถานะ': o.status==='done'?'เสร็จ':'ค้าง',
        'เวลาเสร็จ': o.doneAt||'',
        'Area': it.Area,
        'Set': it.Set,
        'Mat Desc': it['Mat Desc'],
        'Final Code': it['Final Code'],
        'ประเภท': it.type,
        'รูประบบ1 เวลา': o.photoTs[0]||'',
        'รูประบบ2 เวลา': o.photoTs[1]||'',
      });
    });
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Return Orders');
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `BKK1_Return_${today}.xlsx`);
  toast('📊 Export Excel สำเร็จ!');
}

// ===== TOAST =====
function toast(msg, type='ok') {
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast'+(type==='warn'?' warn':type==='err'?' err':'');
  t.textContent=msg;
  w.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

// init
renderItems();
renderT3();
</script>
</body>
</html>
